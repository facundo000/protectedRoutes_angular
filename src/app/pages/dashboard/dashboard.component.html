<div class="min-h-screen bg-gray-50 p-6">
      <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 mb-6">
          <div class="px-6 py-4 border-b border-gray-200">
            <div class="flex justify-between items-center">
              <h1 class="text-xl font-semibold text-gray-800">dashboard Usuarios</h1>
            </div>
          </div>
          
          <!-- Remote users (from API) -->
          <div class="px-6 py-4">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-lg font-semibold">Usuarios remotos</h2>
              <div class="space-x-2">
                <button (click)="loadRemoteUsers()" class="px-3 py-1 bg-indigo-600 text-white rounded">Recargar</button>
              </div>
            </div>

            @if (remoteUsers().length === 0) {
              <div class="text-sm text-gray-500">No hay usuarios aún.</div>
            }

            @if (remoteUsers().length > 0) {
              <table class="w-full table-auto">
                <thead>
                  <tr class="text-left text-sm text-gray-600">
                    <th class="px-4 py-2">#</th>
                    <th class="px-4 py-2">Nombre</th>
                    <th class="px-4 py-2">Username</th>
                    <th class="px-4 py-2">Role</th>
                    <th class="px-4 py-2">Acciones</th>
                  </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                  @for (ru of remoteUsers(); track ru.id; let i = $index) {
                    <tr class="hover:bg-gray-50">
                      <td class="px-4 py-2">{{ i + 1 }}</td>
                      <td class="px-4 py-2">{{ ru.name }} {{ ru.surname }}</td>
                      <td class="px-4 py-2">{{ ru.username }}</td>
                      <td class="px-4 py-2">{{ ru.role }}</td>
                      <td class="px-4 py-2">
                        <button (click)="viewUser(ru)" class="px-2 py-1 bg-blue-100 rounded mr-2">Ver</button>
                        <button (click)="deleteUser(ru)" class="px-2 py-1 bg-red-100 rounded">Eliminar</button>
                      </td>
                    </tr>
                  }
                </tbody>
              </table>
            }
          </div>
        </div>
        
        
      </div>
    </div>
