<div class="min-h-screen bg-gray-50 p-6">
      <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 mb-6">
          <div class="px-6 py-4 border-b border-gray-200">
            <div class="flex justify-between items-center">
              <span class="text-gray-600 font-medium">Usuario: {{ currentUser() }}</span>
              <h1 class="text-xl font-semibold text-gray-800">dashboard Usuarios</h1>
            </div>
          </div>
          
          <!-- Users Table -->
          <div class="overflow-x-auto">
            <table class="w-full">
              <tbody class="divide-y divide-gray-200">
                @for (user of userService.users(); track user.id; let i = $index) {
                  <tr class="hover:bg-gray-50 transition-colors duration-150">
                    <!-- Row Number -->
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 font-medium w-12">
                      {{ i + 1 }}
                    </td>
                    
                    <!-- Role -->
                    <td class="px-6 py-4 whitespace-nowrap w-1/3">
                      <span class="text-sm text-gray-900">Rol: 
                        <span class="font-medium" 
                              [class.text-blue-600]="user.role === 'Admin'"
                              [class.text-gray-600]="user.role === 'User'">
                          {{ user.role }}
                        </span>
                      </span>
                    </td>
                    
                    <!-- Name -->
                    <td class="px-6 py-4 whitespace-nowrap flex-1">
                      <span class="text-sm text-gray-900">{{ user.name }}</span>
                    </td>
                    
                    <!-- Actions -->
                    <td class="px-6 py-4 whitespace-nowrap text-right w-20">
                      <div class="flex items-center justify-end space-x-2">
                        <!-- Info Button -->
                        <button (click)="viewUser(user)"
                                class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-blue-100 hover:bg-blue-200 transition-colors duration-150 group">
                          <svg class="w-4 h-4 text-blue-600 group-hover:text-blue-700" 
                               fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                  d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                          </svg>
                        </button>
                        
                        <!-- Delete Button -->
                        @if (user.role !== 'Admin') {
                          <button (click)="deleteUser(user)"
                                  class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-red-100 hover:bg-red-200 transition-colors duration-150 group">
                            <svg class="w-4 h-4 text-red-600 group-hover:text-red-700" 
                                 fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                            </svg>
                          </button>
                        }
                      </div>
                    </td>
                  </tr>
                }
              </tbody>
            </table>
          </div>
        </div>
        
        <!-- Action Buttons -->
        <div class="flex justify-end space-x-4">
          <button (click)="addUser()"
                  class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors duration-150 shadow-sm">
            Agregar Usuario
          </button>
          <button (click)="exportUsers()"
                  class="px-6 py-2 bg-gray-600 hover:bg-gray-700 text-white rounded-lg font-medium transition-colors duration-150 shadow-sm">
            Exportar Datos
          </button>
        </div>
        
        <!-- User Count -->
        <div class="mt-4 text-center">
          <p class="text-sm text-gray-600">
            Total de usuarios: {{ userService.users().length }} | Administradores: {{ adminCount() }}
          </p>
        </div>
      </div>
    </div>
