<nav class="bg-white border-b border-gray-200 shadow-sm">
  <div class="max-w-6xl mx-auto px-6 py-3 flex items-center justify-between">

    <!-- Logo / Brand -->
    <span class="text-lg font-bold text-blue-600 tracking-tight">GestorApp</span>

    <!-- Nav links -->
    <div class="flex items-center gap-1">
      <a routerLink="/dashboard" routerLinkActive="text-blue-600 bg-blue-50"
         class="inline-flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 transition-colors duration-150">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Dashboard
      </a>

      @if (profileId()) {
        <a [routerLink]="['/user', profileId()]" routerLinkActive="text-blue-600 bg-blue-50"
           class="inline-flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 transition-colors duration-150">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          Mi perfil
        </a>
      }
    </div>

    <!-- User info + logout -->
    <div class="flex items-center gap-3">
      @if (isAdmin()) {
        <span class="text-xs font-medium px-2 py-0.5 rounded-full bg-blue-100 text-blue-700">Admin</span>
      }
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-blue-600 flex items-center justify-center text-white text-sm font-bold">
          {{ getInitials() }}
        </div>
        <span class="text-sm font-medium text-gray-700">{{ username() }}</span>
      </div>
      <button (click)="logout()"
              class="inline-flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm font-medium text-gray-600 hover:text-red-600 hover:bg-red-50 transition-colors duration-150">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Salir
      </button>
    </div>

  </div>
</nav>
